# Complete YAML Configuration Example
#
# This example demonstrates all available configuration options
# for the ee-bench YAML configuration system.
#
# Usage:
#   ee-bench --config examples/yaml-configs/complete.yaml --spec jvm run-evaluation

version: "1.0"
spec: jvm
name: "Collect agent predictions for DPAIA benchmark"
tags:
  - jvm
  - predictions

metadata:
  author: "DPAIA"

# Agent configuration - define one or more agents
agents:
  - name: "idea-mcp-server"
    type: "idea-mcp-server"
    version: "253"
    options:
      edition: ultimate
      project_warmup: true

  - name: "{{ agent }}"
    type: "mcp-codegen"
    description: "IDEA MCP agent"
    version: "latest"
    primary: true
    timeout: 1800

    # Features configuration (MCP, telemetry, etc.)
    features:
      # MCP servers configuration (connects to IDEA MCP server)
      mcp:
        method: "json"
        servers:
          jetbrains-idea:
            type: "sse"
            url: "http://127.0.0.1:8900/sse"
            headers:
              IJ_MCP_SERVER_project_dir: "/workspace/task_project"

      # Telemetry configuration
      telemetry:
        enabled: true
        log_prompts: true

        langfuse:
          enabled: true
          public_key: "$LANGFUSE_PUBLIC_KEY"
          secret_key: "$LANGFUSE_SECRET_KEY"
          host: "$LANGFUSE_HOST"

          name: "{{ instance.instance_id }}"
          tags:
            - "dpaia"
            - "jvm"
            - "{{ agent }}"
            - "idea-mcp-server"
            - "{{ instance.instance_id }}"
            - "{{ instance.build_system }}"
            - "{{ instance.language }}"
          metadata:
            instance_id: "{{ instance.instance_id }}"
            agent: "{{ agent }}"
            mcp_server: "jetbrains-idea"
            repo: "{{ instance.repo }}"
            base_commit: "{{ instance.base_commit }}"
            problem_statement: "{{ instance.problem_statement }}"
            fail_to_pass: "{{ instance.fail_to_pass }}"
            pass_to_pass: "{{ instance.pass_to_pass }}"
            issue_numbers: "{{ instance.issue_numbers }}"
            tags: "{{ instance.tags }}"
            version: "{{ instance.version }}"
            language: "{{ instance.language }}"
            build_system: "{{ instance.build_system }}"

    # Metadata
    metadata:
      author: "DPAIA"

# Dataset configuration
dataset:
  source:
    type: "http"
    format: "json"
    uri: "{{ dataset_uri }}"

  # Dataset options
  cache: true

# Environment configuration
environment:
  # Load pre-configured environment (optional)
  # config_path: environment-config.json

  # Sandbox configuration
  sandbox:
    type: docker          # docker or local

    docker:
      privileged: true
      cache: true
      network: bridge
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock

    # Sandbox environment variables (shared across docker/local)
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
      TESTCONTAINERS_CHECKS_DISABLE: "true"
      DOCKER_HOST: "unix:///var/run/docker.sock"
      # Telemetry bridge configuration (enables langfuse-telemetry-bridge integration)
      LANGFUSE_HOST: "{{ env.LANGFUSE_HOST }}"
      LANGFUSE_SECRET_KEY: "{{ env.LANGFUSE_SECRET_KEY }}"
      LANGFUSE_PUBLIC_KEY: "{{ env.LANGFUSE_PUBLIC_KEY }}"

  # Workspace directory
  workspace_dir: "/workspace"
  project_dir: "/workspace/task_project"

  # Docker image configuration (simple format)
  image: "{{ instance.instance_id }}:dependencies"

  # Build options
  parallel: true          # Build environments in parallel
  max_workers: 8          # Number of parallel workers

  # Collect IDEA logs after each prediction
  hooks:
    post:
      - name: collect_idea_logs
        type: collect_artifacts
        options:
          paths:
            - "/workspace/.ide-system/log/**"
          destination: "{{ instance.instance_id }}/idea-logs"

  # Environment configurers
  configurers:
    - name: "Configure IDEA environment"
      type: agents
      image:
        build: true
        name: "{{ instance.instance_id }}:idea-mcp" #cache image with IDEA
      options:
        agents: "idea-mcp-server"

    - name: "Configure MCP Proxy"
      type: mcp-proxy-configurer
      image:
        build: true
        name: "{{ instance.instance_id }}:mcp-proxy__idea-253"

    - name: "Configure MCP agent"
      type: mcp-agent-configurer
      image:
        build: true
        name: "{{ instance.instance_id }}:{{ agent }}__idea-mcp"
      options:
        mcp_agent_target_dir: "/workspace/mcp_agent"

     # TODO: Script moved into mcp_agent install-mcp-codegen.sh, because running script from yaml configuration seems bugged
